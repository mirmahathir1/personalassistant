services:
  llama:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llama-server
    restart: unless-stopped
    ports:
      # Same port the assistant talks to (http://localhost:8317/v1). Swapping this
      # folder in for ./api requires zero changes to the assistant code.
      - "8317:8317"
    volumes:
      # Cache the downloaded GGUF so it is fetched only once.
      - ./models:/root/.cache/llama.cpp
    command: >
      --host 0.0.0.0
      --port 8317
      -hf bartowski/Llama-3.1-8B-Lexi-Uncensored-V2-GGUF:Q4_K_M
      --jinja
      --ctx-size 8192
