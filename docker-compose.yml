services:
  model-init:
    image: ${BACKEND_IMAGE:-personalassistant-backend:latest}
    pull_policy: never
    working_dir: /workspace
    environment:
      MODEL_URL: ${MODEL_URL:-https://huggingface.co/hugging-quants/Llama-3.2-1B-Instruct-Q4_K_M-GGUF/resolve/main/llama-3.2-1b-instruct-q4_k_m.gguf?download=true}
      MODEL_FILENAME: ${MODEL_FILENAME:-llama-3.2-1b-instruct-q4_k_m.gguf}
      MODELS_DIR: /workspace/models
    volumes:
      - .:/workspace
    command: ["python", "scripts/download_model.py"]
    restart: "no"

  llama:
    image: ${LLAMA_CPP_IMAGE:-personalassistant-llm:latest}
    pull_policy: never
    working_dir: /workspace
    depends_on:
      model-init:
        condition: service_completed_successfully
    volumes:
      - .:/workspace
    ports:
      - "${LLAMA_PORT:-8080}:8080"
    command:
      - "-m"
      - "/workspace/models/${MODEL_FILENAME:-llama-3.2-1b-instruct-q4_k_m.gguf}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "-c"
      - "${LLAMA_CONTEXT_SIZE:-4096}"
      - "-n"
      - "${LLAMA_MAX_TOKENS:-512}"

  backend:
    image: ${BACKEND_IMAGE:-personalassistant-backend:latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
    pull_policy: never
    working_dir: /workspace
    depends_on:
      llama:
        condition: service_started
    environment:
      FLASK_DEBUG: ${FLASK_DEBUG:-1}
      LLAMA_SERVER_URL: http://llama:8080
      LLAMA_MODEL_NAME: ${LLAMA_MODEL_NAME:-llama-3.2-1b-instruct-q4_k_m}
      LLAMA_REQUEST_TIMEOUT_SECONDS: ${LLAMA_REQUEST_TIMEOUT_SECONDS:-180}
    volumes:
      - .:/workspace
    ports:
      - "${BACKEND_PORT:-5001}:5000"
