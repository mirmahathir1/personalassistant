services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      PRELOAD_MODEL: "false"
      MODEL_CACHE_DIR: /models
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    volumes:
      - ./models:/models

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"
